name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify project structure
        run: |
          python -c "from data.plans import telecom_plans; print(f'Plans loaded: {len(telecom_plans)}')"
          python -c "from bot.quiz_engine import get_quiz_question; print('Quiz engine OK')"
          python -c "from agent.triage_agent import run_triage_agent; print('Triage agent OK')"

  build:
    name: build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t integrated-telecom-bot:latest .
          echo "Docker build successful"

      - name: Verify Docker image
        run: docker images integrated-telecom-bot

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deployment summary
        run: |
          echo "================================"
          echo "  Telecom Bot Deploy Summary"
          echo "================================"
          echo "Docker image: integrated-telecom-bot:latest"
          echo "K8s deployment: k8s/deployment.yaml"
          echo "K8s service: k8s/service.yaml"
          echo "Terraform IaC: terraform/main.tf"
          echo "Status: Ready for deployment"
          echo "================================"
