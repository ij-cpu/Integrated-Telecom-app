name: Telecom Bot CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify project structure
        run: |
          python -c "from data.plans import telecom_plans; print(f'Plans loaded: {len(telecom_plans)}')"
          python -c "from bot.quiz_engine import get_quiz_question; print('Quiz engine OK')"
          python -c "from agent.triage_agent import run_triage_agent; print('Triage agent OK')"

      - name: Build Docker image
        run: |
          docker build -t integrated-telecom-bot .
          echo "Docker build successful"